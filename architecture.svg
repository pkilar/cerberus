<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 550" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="550" rx="12" fill="#f8fafc"/>

  <!-- User box -->
  <rect x="30" y="140" width="140" height="120" rx="10" fill="#fff" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="185" text-anchor="middle" font-weight="600" font-size="15" fill="#1e293b">User</text>
  <text x="100" y="205" text-anchor="middle" font-size="11" fill="#64748b">(Kerberos Client)</text>
  <circle cx="100" cy="235" r="14" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="100" y="240" text-anchor="middle" font-size="16" fill="#6366f1">&#x1f511;</text>

  <!-- EC2 Host boundary (contains both the host services and the Nitro Enclave) -->
  <rect x="210" y="40" width="690" height="440" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="6 3" filter="url(#shadow)"/>
  <text x="230" y="68" font-weight="600" font-size="14" fill="#1d4ed8">EC2 Instance (Host OS)</text>

  <!-- ssh-cert-api box -->
  <rect x="240" y="140" width="230" height="120" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="355" y="175" text-anchor="middle" font-weight="700" font-size="15" fill="#1e40af">ssh-cert-api</text>
  <text x="355" y="198" text-anchor="middle" font-size="11" fill="#64748b">Web API Service</text>
  <text x="355" y="216" text-anchor="middle" font-size="11" fill="#64748b">Authentication &amp; Authorization</text>
  <text x="355" y="234" text-anchor="middle" font-size="11" fill="#64748b">SPNEGO / Kerberos</text>
  <rect x="295" y="242" width="120" height="4" rx="2" fill="#3b82f6" opacity="0.3"/>

  <!-- config.yaml box -->
  <rect x="270" y="360" width="170" height="70" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="355" y="393" text-anchor="middle" font-size="12" fill="#475569">&#128196; config.yaml</text>
  <text x="355" y="412" text-anchor="middle" font-size="10" fill="#94a3b8">Groups &amp; Rules</text>

  <!-- Nitro Enclave boundary (nested inside the EC2 instance) -->
  <rect x="550" y="75" width="320" height="385" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5" stroke-dasharray="6 3" filter="url(#shadow)"/>
  <text x="710" y="103" text-anchor="middle" font-weight="600" font-size="14" fill="#047857">AWS Nitro Enclave</text>
  <text x="710" y="121" text-anchor="middle" font-size="10" fill="#6ee7b7">&#x1f512; Isolated &amp; Attested</text>

  <!-- ssh-cert-signer box -->
  <rect x="595" y="140" width="230" height="120" rx="10" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="710" y="175" text-anchor="middle" font-weight="700" font-size="15" fill="#065f46">ssh-cert-signer</text>
  <text x="710" y="198" text-anchor="middle" font-size="11" fill="#64748b">Enclave Signing Service</text>
  <text x="710" y="216" text-anchor="middle" font-size="11" fill="#64748b">SSH Certificate Signing</text>
  <text x="710" y="234" text-anchor="middle" font-size="11" fill="#64748b">CA Key in Memory Only</text>
  <rect x="650" y="242" width="120" height="4" rx="2" fill="#10b981" opacity="0.3"/>

  <!-- KMS encrypted key box -->
  <rect x="625" y="360" width="170" height="70" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="710" y="388" text-anchor="middle" font-size="12" fill="#475569">&#x1f510; KMS-encrypted</text>
  <text x="710" y="407" text-anchor="middle" font-size="12" fill="#475569">CA Private Key</text>

  <!-- Arrow 1: User -> API (HTTPS) -->
  <line x1="170" y1="180" x2="235" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="184" y="163" width="50" height="18" rx="4" fill="#dbeafe"/>
  <text x="209" y="176" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">HTTPS</text>
  <circle cx="182" cy="180" r="10" fill="#3b82f6"/>
  <text x="182" y="184" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">1</text>

  <!-- Arrow 6: API -> User (signed cert) -->
  <line x1="235" y1="230" x2="170" y2="230" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="182" cy="230" r="10" fill="#3b82f6"/>
  <text x="182" y="234" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">6</text>

  <!-- Arrow 2: API -> config.yaml -->
  <line x1="355" y1="260" x2="355" y2="355" stroke="#475569" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <circle cx="355" cy="308" r="10" fill="#64748b"/>
  <text x="355" y="312" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">2</text>

  <!-- Arrow 3: API -> Signer (VSOCK, crosses the enclave boundary) -->
  <line x1="470" y1="180" x2="590" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="500" y="163" width="60" height="18" rx="4" fill="#d1fae5"/>
  <text x="530" y="176" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">VSOCK</text>
  <circle cx="483" cy="180" r="10" fill="#10b981"/>
  <text x="483" y="184" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">3</text>

  <!-- Arrow 4: Signer -> KMS key -->
  <line x1="710" y1="260" x2="710" y2="355" stroke="#475569" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <circle cx="710" cy="308" r="10" fill="#64748b"/>
  <text x="710" y="312" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">4</text>

  <!-- Arrow 5: Signer -> API (signed cert back) -->
  <line x1="590" y1="230" x2="475" y2="230" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="578" cy="230" r="10" fill="#10b981"/>
  <text x="578" y="234" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">5</text>

  <!-- AWS KMS (external service, outside the EC2 host AND the enclave). The HOST
       performs the KMS Decrypt directly, passing the enclave's attestation document;
       KMS returns the CA key encrypted to the enclave's public key, so only the
       enclave can open it. No in-enclave network and no KMS proxy. -->
  <rect x="30" y="335" width="140" height="80" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="365" text-anchor="middle" font-weight="700" font-size="14" fill="#92400e">AWS KMS</text>
  <text x="100" y="386" text-anchor="middle" font-size="10" fill="#64748b">Decrypt (attested)</text>
  <text x="100" y="401" text-anchor="middle" font-size="10" fill="#64748b">&#x2192; enclave-only ciphertext</text>

  <!-- Arrow 7: ssh-cert-api -> AWS KMS (host-mediated attested Decrypt) -->
  <line x1="240" y1="250" x2="150" y2="333" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <rect x="118" y="286" width="98" height="18" rx="4" fill="#fef3c7"/>
  <text x="167" y="299" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">attested Decrypt</text>
  <circle cx="232" cy="256" r="10" fill="#f59e0b"/>
  <text x="232" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">7</text>

  <!-- Legend -->
  <rect x="30" y="500" width="860" height="35" rx="6" fill="#f1f5f9"/>
  <circle cx="55" cy="517" r="6" fill="#3b82f6"/>
  <text x="67" y="521" font-size="11" fill="#475569">HTTPS flow</text>
  <circle cx="175" cy="517" r="6" fill="#10b981"/>
  <text x="187" y="521" font-size="11" fill="#475569">VSOCK flow</text>
  <circle cx="295" cy="517" r="6" fill="#64748b"/>
  <text x="307" y="521" font-size="11" fill="#475569">Data access</text>
  <line x1="410" y1="517" x2="440" y2="517" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="447" y="521" font-size="11" fill="#475569">Host-mediated attested KMS Decrypt</text>
</svg>
