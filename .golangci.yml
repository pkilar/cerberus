# golangci-lint v2 configuration.
# Run: golangci-lint run ./...
# Docs: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - contextcheck
    - errorlint
    - gosec
    - misspell
    - modernize
    - nilerr
    - prealloc
    - unconvert

  exclusions:
    rules:
      # Tests frequently ignore errors on cleanup paths and exercise edge cases
      # that gosec flags as risky — those are intentional in test fixtures.
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
