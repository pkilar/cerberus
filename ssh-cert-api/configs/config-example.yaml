# config.yaml
# This file defines the authorization policies for the SSH Certificate Authority.
# It maps Kerberos principals (users) to groups, and groups to specific
# certificate signing permissions.
#
# ┌──────────────────────────────────────────────────────────────────────┐
# │                    CASBIN AUTHORIZATION MODEL                       │
# ├──────────────────────────────────────────────────────────────────────┤
# │ This file is the SINGLE SOURCE OF TRUTH for authorization.          │
# │ There is no separate Casbin policy or model file — both are         │
# │ generated programmatically from this YAML at startup.               │
# │                                                                     │
# │ HOW IT WORKS:                                                       │
# │                                                                     │
# │ 1. Each group's members become user-to-group mappings:              │
# │      alice@REALM.COM  →  backend-engineers                          │
# │      bob@REALM.COM    →  backend-engineers                          │
# │      charlie@REALM.COM → data-analysts                              │
# │                                                                     │
# │ 2. Each group's allowed_principals become Casbin policies:          │
# │      p, backend-engineers, root, sign                               │
# │      p, backend-engineers, ec2-user, sign                           │
# │      p, data-analysts, analyst, sign                                │
# │      p, data-analysts, readonly-user, sign                          │
# │                                                                     │
# │ 3. When a user requests a certificate, Casbin evaluates:            │
# │      Enforce(groupName, requestedPrincipal, "sign")                 │
# │    for each group the user belongs to (alphabetical order).         │
# │                                                                     │
# │ RULES:                                                              │
# │  - Groups are evaluated in alphabetical order (deterministic)       │
# │  - ALL requested principals must match within a SINGLE group        │
# │  - A user in multiple groups CANNOT combine principals across them  │
# │  - Use "*" in allowed_principals to permit any SSH principal        │
# │  - The matched group's certificate_rules (validity, permissions,    │
# │    attributes, critical_options) are applied to the certificate     │
# │                                                                     │
# │ EXAMPLE — user in multiple groups:                                  │
# │  alice is in both "backend-engineers" and "data-analysts":          │
# │    Request ["root"]    → allowed via backend-engineers (8h cert)    │
# │    Request ["analyst"] → allowed via data-analysts (1h cert)        │
# │    Request ["root", "analyst"] → DENIED (no single group has both)  │
# └──────────────────────────────────────────────────────────────────────┘

# Path to the Kerberos keytab file for authenticating incoming requests
keytab_path: "/etc/krb5.keytab"

# Service principal name for SPNEGO authentication (optional)
# If not specified, the service will use the principal from the keytab
# Example: "HTTP/hostname.domain.com@REALM.COM"
service_principal: ""

# IP address and port to listen on, default ":8443" if not specified
listen: ""

# Location of the TLS certificate and key, defaults are "cert.pem", "key.pem" in the same folder as the binary
# For local dev, generate self-signed certs: go run $(go env GOROOT)/src/crypto/tls/generate_cert.go --host localhost
tls_cert: ""
tls_key: ""

# ──────────────────────────────────────────────────────────────────────
# LDAP-backed RBAC (optional)
# ──────────────────────────────────────────────────────────────────────
# Each entry under `ldap:` declares one directory backend. Backends are
# routed by Kerberos realm: when a user authenticates as `alice@REALM-A`,
# the backend whose `realms:` includes `REALM-A` is consulted and `alice`
# (the short uid) is looked up. Realms must not overlap across backends.
#
# Per-group rules:
#   - A group is either `members:` (static) OR `ldap_groups:` (LDAP-backed),
#     never both. Validated at startup.
#   - LDAP failure for an LDAP-backed group fails closed (denies the
#     request). Static groups are unaffected by LDAP state.
#
# Delete the entire `ldap:` section to disable directory-backed RBAC; the
# service then behaves exactly as it did before LDAP support was added.
#
# ldap:
#   - name: corp-ad
#     realms: [CORP.EXAMPLE.COM]
#     url: ldaps://ad.corp.example:636
#     bind:
#       method: simple                   # simple | gssapi | anonymous
#       dn: "CN=ssh-cert-api,OU=Service,DC=corp,DC=example"
#       password_file: /etc/cerberus/ldap.pw    # mode 0600 / 0400 only
#     user_base_dn: "DC=corp,DC=example"
#     # Exactly one %s placeholder, LDAP-escaped at request time.
#     user_filter: "(sAMAccountName=%s)"
#     group_membership_attr: memberOf           # default
#     tls:
#       ca_file: /etc/cerberus/ldap-ca.pem
#       insecure_skip_verify: false             # warned at startup if true
#     timeout: 5s                                # default
#     cache_ttl: 60s                             # default; hard cap 10m
#
#   # GSSAPI bind reuses the API's own keytab. client_principal selects the
#   # initiator identity within the keytab.
#   - name: corp-openldap
#     realms: [OTHER.EXAMPLE.COM]
#     url: ldaps://ldap.other.example:636
#     bind:
#       method: gssapi
#       client_principal: "HTTP/api.example.com@OTHER.EXAMPLE.COM"
#       krb5_conf_path: /etc/krb5.conf          # default
#     user_base_dn: "ou=people,dc=other,dc=example"
#     user_filter: "(uid=%s)"
#     group_membership_attr: memberOf
#     tls:
#       ca_file: /etc/cerberus/other-ca.pem

groups:
  # The 'backend-engineers' group has access to production servers.
  backend-engineers:
    # List of Kerberos principals (e.g., from Active Directory or MIT Kerberos)
    # who belong to this group. The API will check the authenticated user's
    # principal against this list.
    members:
      - "alice@YOUR-REALM.COM"
      - "bob@YOUR-REALM.COM"

    # Rules that apply to certificates issued to members of this group.
    certificate_rules:
      # Maximum validity period for the certificate. Uses Go's time.ParseDuration format.
      # (e.g., "8h" for 8 hours, "30m" for 30 minutes).
      validity: "8h"

      # A list of server usernames (principals) that the signed key is allowed
      # to log in as. These become Casbin policies: p, <group>, <principal>, sign
      # Use "*" as a single entry to allow ANY SSH principal for this group.
      # Example wildcard: allowed_principals: ["*"]
      allowed_principals:
        - "root"
        - "ec2-user"

      # Standard SSH certificate permissions.
      # An empty string "" means the permission is granted.
      # A non-empty string can add specific restrictions (though typically not used).
      # If a permission is omitted, it is denied.
      # Full list at: https://www.ietf.org/id/draft-miller-ssh-cert-01.html

      # Some basic extensions:
      # permit-x11-forwarding: Permit X11 forwarding (using ssh -X) to run remote X11 programs on a local display.
      # permit-agent-forwarding: Permit Agent forwarding (using ssh -A) to forward local SSH agent keys to the remote host. (See our blog post SSH Agent Explained for more.)
      # permit-port-forwarding: Permit port forwardings (tunnels) from local to remote (using ssh -L) or from remote to local (using ssh -R)
      # permit-pty: This one's pretty important. If you want an interactive shell session, you need a pty (a pseudo-tty) to be allocated to you by the host. The alternative is a remote host that doesn't allow any interactivity.
      # permit-user-rc: Run a personal RC file upon connection (located in ~/.ssh/rc on the remote)
      permissions:
        permit-X11-forwarding: ""
        permit-agent-forwarding: ""
        permit-port-forwarding: ""
        permit-pty: ""
        permit-user-rc: ""

      # Static key-value pairs that will be embedded as custom extensions
      # in the signed certificate. Useful for auditing and context.
      #
      # Per the SSH certificate spec (PROTOCOL.certkeys §4), names that are
      # not defined by OpenSSH MUST be namespaced as `name@domain` to avoid
      # collisions with future standard extensions. sshd will still log a
      # benign "extension is not supported" message for these — that's
      # expected, the cert authenticates fine. Replace `example.com` with
      # your organization's domain.
      static_attributes:
        team@example.com: "backend"
        access-level@example.com: "production"

      # Critical options are a set of directives that, when present in a certificate, must be understood and processed by the SSH server.
      # If the server doesn't recognize a critical option, it will reject the certificate, preventing authentication.
      # The most common critical options are force-command and source-address.
      critical_options:
        source-address: "10.20.30.0/24,1.1.1.1/32"

  # The 'data-analysts' group has more restricted access.
  data-analysts:
    members:
      - "charlie@YOUR-REALM.COM"

    certificate_rules:
      validity: "1h"
      allowed_principals:
        - "analyst"
        - "readonly-user"
      permissions:
        # Note: No port forwarding for this group.
        permit-pty: ""
        permit-user-rc: ""
      static_attributes:
        team@example.com: "data"
        access-level@example.com: "restricted"

  # Example of an LDAP-backed group. Membership is decided at request time
  # by querying the LDAP backend whose realms cover the user's Kerberos
  # realm. A user qualifies for this group if their `memberOf` attribute
  # in LDAP includes ANY of the DNs listed here. Cannot coexist with
  # `members:` in the same group.
  #
  # ssh-admins:
  #   ldap_groups:
  #     - "CN=ssh-admins,OU=Groups,DC=corp,DC=example"
  #   certificate_rules:
  #     validity: "8h"
  #     allowed_principals: ["root"]
  #     permissions:
  #       permit-pty: ""
