name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Build & test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [".", "ssh-cert-api", "ssh-cert-signer"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build -v ./...

      - name: go mod tidy drift check
        working-directory: ${{ matrix.module }}
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Test with race detector and shuffled order
        working-directory: ${{ matrix.module }}
        run: go test -race -shuffle=on -count=1 ./...

  lint:
    name: golangci-lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [".", "ssh-cert-api", "ssh-cert-signer"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: ${{ matrix.module }}

  vuln:
    name: govulncheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [".", "ssh-cert-api", "ssh-cert-signer"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            ssh-cert-api/go.sum
            ssh-cert-signer/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      # -severity=medium filters LOW-severity noise: G104 (unchecked
      # json.NewEncoder(w).Encode — best-effort HTTP response writes) and
      # G706 (log-injection via taint — slog text/JSON handlers already
      # escape structured attrs, so this is a false positive at scale).
      # MEDIUM+ findings still fail the build and are fixed inline with
      # #nosec comments carrying a justification.
      - name: gosec (root)
        run: gosec -severity=medium ./...

      - name: gosec (ssh-cert-api)
        working-directory: ssh-cert-api
        run: gosec -severity=medium ./...

      - name: gosec (ssh-cert-signer)
        working-directory: ssh-cert-signer
        run: gosec -severity=medium ./...
